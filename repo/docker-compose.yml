services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitcommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitcommerce_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fitcommerce}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fitcommerce} -d ${POSTGRES_DB:-fitcommerce}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ENV: ${ENV:-development}
      PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-fitcommerce}:${POSTGRES_PASSWORD:-fitcommerce_secret}@db:5432/${POSTGRES_DB:-fitcommerce}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-604800}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      EXPORT_DIR: "/app/exports"
    volumes:
      - export_files:/app/exports
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      ENV: ${ENV:-development}
      DATABASE_URL: "postgres://${POSTGRES_USER:-fitcommerce}:${POSTGRES_PASSWORD:-fitcommerce_secret}@db:5432/${POSTGRES_DB:-fitcommerce}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      EXPORT_DIR: "/app/exports"
    volumes:
      - export_files:/app/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  export_files:
